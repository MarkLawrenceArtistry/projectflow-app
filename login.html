<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProjectFlow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card card">
            <h2>ProjectFlow</h2>
            <p id="auth-error" class="auth-error"></p>
            
            <form id="login-form" class="auth-form">
                <h3>Sign In</h3>
                <div class="form-group"><label for="login-email">Email</label><input type="email" id="login-email" class="form-input" required></div>
                <div class="form-group"><label for="login-password">Password</label><input type="password" id="login-password" class="form-input" required></div>
                <button type="submit" class="btn btn-primary">Sign In</button>
                <p class="auth-toggle">Don't have an account? <a href="#" id="show-signup-link">Sign Up</a></p>
            </form>

            <form id="signup-form" class="auth-form" style="display: none;">
                <h3>Create Account</h3>
                <div class="form-group"><label for="signup-name">Your Name</label><input type="text" id="signup-name" class="form-input" required></div>
                <div class="form-group"><label for="signup-email">Email</label><input type="email" id="signup-email" class="form-input" required></div>
                <div class="form-group"><label for="signup-password">Password</label><input type="password" id="signup-password" class="form-input" required minlength="6"></div>
                <button type="submit" class="btn btn-primary">Sign Up</button>
                <p class="auth-toggle">Already have an account? <a href="#" id="show-login-link">Sign In</a></p>
            </form>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
